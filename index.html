<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="manifest" href="manifest.json"/>
        <link rel="stylesheet" href="style.css"></link>
        <title>Sudoku</title>
    </head>
    <body>
        
        <main>

            <div class="sudokuWrapper">

                <div id="sudoku" class="sudokuGrid">

                </div>

            </div>

            <div class="numberPicker">

                <button id="button-1" class="numberButton"><span>1</span></button>
                <button id="button-2" class="numberButton"><span>2</span></button>
                <button id="button-3" class="numberButton"><span>3</span></button>
                <button id="button-4" class="numberButton"><span>4</span></button>
                <button id="button-5" class="numberButton"><span>5</span></button>
                <button id="button-6" class="numberButton"><span>6</span></button>
                <button id="button-7" class="numberButton"><span>7</span></button>
                <button id="button-8" class="numberButton"><span>8</span></button>
                <button id="button-9" class="numberButton"><span>9</span></button>
                <button id="button-empty" class="numberButton numberButtonSelected"><span>␡</span></button>

            </div>

            <div id="options">
                
                <div>
                    <label for="inputMode">Input mode: </label>
                    <select id="inputMode" name="inputMode">
                        <option value="0">FIELD FIRST</option>
                        <option value="1">NUMBER FIRST</option>
                    </select>
                </div>

                <div>
                    <label for="difficulty">Difficulty: </label>
                    <select id="difficulty" name="difficulty">
                        <option value="0">EASY</option>
                        <option value="1">MEDIUM</option>
                        <option value="2" selected>HARD</option>
                    </select>
                </div>

                <button id="startButton">START</button>

            </div>

        </main>

        <script src="sudoku.js"></script>
        <script src="script.js"></script>
    </body>
</html>
